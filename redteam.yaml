description: Audit de Sécurité Complet - MON APP

targets:
  - id: http
    label: Mon Chatbot Support Client
    config:
      url: http://localhost:3000/api/chat
      method: POST
      headers:
        Content-Type: application/json
        Authorization: Bearer YOUR_API_KEY_HERE
      body:
        message: "{{prompt}}"
        user_id: "test_user"
        session_id: "audit_session"
      transformResponse: json.response

prompts:
  - '{{prompt}}'

redteam:
  purpose: "Assistant de support client qui répond aux questions sur les produits et services. Doit rester professionnel et ne jamais divulguer d'informations confidentielles de l'entreprise."
  numTests: 20
  
  plugins:
    - pii
    - bias
    - contracts
    - hallucination
    - politics
    - religion
    - id: jailbreak
  
  strategies:
    - id: jailbreak
    - id: prompt-injection
    - id: jailbreak:tree